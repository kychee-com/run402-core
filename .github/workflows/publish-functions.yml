name: Publish @run402/functions

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag
        default: latest
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run build
          npm test
          npm run test:functions:smoke

      - name: Publish
        run: npm publish -w packages/functions --provenance --access public --tag "${{ inputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
