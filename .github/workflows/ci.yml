name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Functions tarball smoke
        run: npm run test:functions:smoke

      - name: Release tarball smoke
        run: npm run test:release:smoke

      - name: Core boundary check
        run: npm run core:boundary

      - name: Core Compose boot
        run: docker compose up -d postgres postgrest core

      - name: Core health
        run: npm run core:health

      - name: Core project smoke
        run: npm run core:smoke

      - name: Core apply smoke
        run: npm run core:conformance

      - name: Core Compose logs
        if: failure()
        run: docker compose logs

      - name: Core Compose down
        if: always()
        run: docker compose down -v
